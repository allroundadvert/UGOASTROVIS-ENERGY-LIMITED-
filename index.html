width:100%;

}

/* ADDRESS */
.address{
text-align:center;
padding:8px;
font-weight:bold;
background:white;
}

/* MOVING SLIDER */
.slider{
overflow:hidden;
background:#f4f4f4;
padding:10px 0;
}

.slide-track{
display:flex;
width:calc(250px * 20);
animation:scroll 40s linear infinite;
}

.slide-track img{
width:250px;
margin:5px;
border-radius:6px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GALLERY GRID */
.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.gallery img{
width:100%;
border-radius:6px;
}

@media(max-width:600px){
.gallery{
grid-template-columns:1fr;
}
}

</style>
