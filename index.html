/* HEADER */

.slider-container{
display:flex;
width:100%;
height:200px;
overflow:hidden;
max-width:900px;
margin:auto;
}

.slider-container img{
width:50%;
object-fit:cover;
animation:slide 6s infinite alternate;
}

@keyframes slide{
0%{transform:translateX(0);}
100%{transform:translateX(50%);}
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:6px;
max-width:900px;
margin:20px auto;
padding:5px;
}

.gallery img{
width:100%;
height:180px;
object-fit:cover;
border-radius:4px;
}

/* FORM */

form{
max-width:650px;
margin:auto;
padding:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:none;
border-radius:5px;
}

textarea{
height:100px;
}

button{
width:100%;
padding:14px;
background:gold;
color:black;
border:none;
border-radius:6px;
font-weight:bold;
}

/* MAP */

.map iframe{
width:100%;
height:300px;
border:0;
}

/* MOBILE */

@media(max-width:600px){

.slider-container{height:160px;}

.gallery img{height:140px;}

}

</style>
