<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doorz Empire</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  max-height:320px;
  background:#0a0a0a;
  border-bottom:4px solid var(--gold);
}
.hero img{
  max-width:100%;
  max-height:320px;
  object-fit:contain;
}

/* INFO */
.info{
  text-align:center;
  padding:10px 15px;
}
.info h2{color:var(--gold); margin-bottom:5px;}
.info p{margin-top:0;}

/* MOVING IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:40px auto;
  border-top:1px solid rgba(212,175,55,.4);
  border-bottom:1px solid rgba(212,175,55,.4);
}
.moving-track{
  display:flex;
  width:max-content;
  animation:slide 10s linear infinite;
}
.moving-track img{
  width:50vw;
  max-width:520px;
  height:260px;
  object-fit:cover;
  margin:10px;
  border:2px solid var(--gold);
}
@keyframes slide{
  0%{transform:translateX(0);}
  50%{transform:translateX(-50%);}
  100%{transform:translateX(0);}
}

/* GALLERY */
.gallery{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border:2px solid rgba(212,175,55,.6);
  box-shadow:0 0 12px rgba(212,175,55,.25);
}

/* FORM */
.form-box{
  max-width:750px;
  margin:50px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
  margin-bottom:15px;
}
label{
  display:block;
  margin-top:15px;
  font-weight:600;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}
textarea{
  min-height:100px;
}
button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

/* MAP */
.map iframe{
  width:100%;
  height:350px;
  border:2px solid rgba(212,175,55,.4);
  margin-top:20px;
}

/* FLOATING BUTTONS */
.whatsapp,.facebook{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.facebook{bottom:150px;background:#1877f2}

footer{
  background:#000;
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<h2>Booking & Order Form</h2>
<form onsubmit="send();return false;">

<label><input type="checkbox" value="Isreali door"> Isreali door</label>

<label><input type="checkbox" value="Turkey door"> Turkey door</label>
<label><input type="checkbox" value="Italian door"> Italian door</label>
<label><input type="checkbox" value="Glass door"> Glass door</label>
<label><input type="checkbox" value="Security door"> Security door</label>

</div>

<iframe src="https://www.google.com/maps?q=Former+deputy+junction+along+the+express+beside+nnpc+fuel+station+asaba+delta+state&output=embed"></iframe>
</div>

<label>Specifications</label>
<textarea id="specifications"></textarea>

<label>Delivery</label>
<select id="delivery"><option>Yes</option><option>No</option></select>

<label>Installation</label>
<select id="install"><option>Yes</option><option>No</option></select>

<label>Customer Address</label>
<input id="customerAddress">

<button>Submit via WhatsApp</button>

<a class="whatsapp" href="https://wa.me/2347034433503">WhatsApp</a>
<a class="facebook" href="https://www.facebook.com/share/1T26ikf4s8/">Facebook</a>

<script>
function send(){
  const name = document.getElementById("customerName").value;
  const phone = document.getElementById("customerPhone").value;
  const specs = document.getElementById("specifications").value;
  const delivery = document.getElementById("delivery").value;
  const install = document.getElementById("install").value;
  const address = document.getElementById("customerAddress").value;

  const doors = [...document.querySelectorAll('#door input:checked')]
    .map(d=>d.value).join(', ');

  const msg = `Name: ${name}
Phone: ${phone}
Door: ${doors}
Specs: ${specs}
Delivery: ${delivery}
Install: ${install}
Address: ${address}`;

  window.open("https://wa.me/2347034433503?text="+encodeURIComponent(msg));
}
</script>
